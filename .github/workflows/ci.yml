name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Smart Contracts (Hardhat + Solidity) ────────
  smart-contracts:
    name: Smart Contracts
    needs: changes
    if: needs.changes.outputs.smc == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: smc/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Compile contracts
        run: npm run compile

      - name: Run tests
        run: npm run test

      - name: Run coverage
        run: npm run coverage

  # ── Frontend (Next.js + TypeScript) ─────────────
  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.fe == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FE

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: FE/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
